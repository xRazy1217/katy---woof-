<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Command Center v7.0 | Katy & Woof - E-commerce & Pet Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
</head>
<body class="admin-body min-h-screen">
    <div id="loading-screen" class="loading-overlay" style="position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;">
        <div class="spinner" style="width: 40px; height: 40px; border: 4px solid var(--soft-blue); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        <p class="text-[10px] font-black uppercase tracking-widest">Sincronizando Atelier...</p>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <div id="login-portal" class="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-cream">
        <div class="max-w-md w-full glass-card p-12 rounded-[3rem] text-center shadow-2xl">
            <h1 class="text-3xl serif font-bold mb-8">Atelier Login</h1>
            <input type="password" id="auth-input" placeholder="Clave de Acceso" class="form-input text-center mb-4 tracking-widest font-bold">
            <button onclick="AdminUI.attemptAuth()" class="w-full py-5 btn-magic rounded-2xl font-black uppercase text-[10px] tracking-widest mb-4">Entrar</button>
            <button onclick="AdminUI.testConnection()" class="text-[9px] uppercase tracking-widest text-stone-400 hover:text-midnight transition-colors">Probar Conexión</button>
        </div>
    </div>

    <main id="admin-content" class="hidden max-w-7xl mx-auto p-6 md:p-12 opacity-0 transition-opacity duration-700">
        <div id="admin-diagnostics-banner" class="hidden mb-6 rounded-2xl border p-4 text-[10px] uppercase tracking-widest font-bold"></div>
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
            <div><h1 class="text-4xl serif font-bold">Command Center v7.0</h1><p class="text-stone-400 text-xs uppercase tracking-widest font-bold mt-1">E-commerce & Pet Studio</p></div>
            <div class="flex items-center gap-4">
                <nav class="flex bg-white/50 p-1 rounded-2xl shadow-sm border border-stone-100 flex-wrap justify-center">
                    <button onclick="AdminUI.switchTab('identity')" class="tab-btn active px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="identity">Identidad</button>
                    <button onclick="AdminUI.switchTab('visuals')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="visuals">Visuales</button>
                    <button onclick="AdminUI.switchTab('portfolio')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="portfolio">Portafolio</button>
                    <button onclick="AdminUI.switchTab('services')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="services">Servicios</button>
                    <button onclick="AdminUI.switchTab('proceso')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="proceso">Proceso</button>
                    <button onclick="AdminUI.switchTab('blog')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="blog">Blog</button>
                    <button onclick="AdminUI.switchTab('settings')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="settings">Textos</button>
                    <button onclick="AdminUI.switchTab('products')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="products">🛍️ Productos</button>
                    <button onclick="AdminUI.switchTab('orders')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="orders">📦 Pedidos</button>
                    <button onclick="AdminUI.switchTab('coupons')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="coupons">🎫 Cupones</button>
                    <button onclick="AdminUI.switchTab('system')" class="tab-btn px-4 py-3 text-[9px] font-black uppercase tracking-widest" data-tab="system">✓ Sistema</button>
                </nav>
                <button onclick="AdminUI.logout()" class="p-3 bg-red-50 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- Dynamic Tab Container (compatible con admin.html sin procesamiento PHP) -->
        <div id="tab-container"></div>
    </main>

    <div id="toast" class="px-8 py-4 text-white rounded-full text-[10px] font-black uppercase tracking-widest shadow-2xl toast-success">Operación Exitosa</div>

    <script src="admin-api.js"></script>
    <script src="admin-ui.js"></script>
    <script src="admin/js/content-validator.js"></script>
    <script src="admin/js/base-content-manager.js"></script>
    <script src="admin/js/portfolio-manager.js"></script>
    <script src="admin/js/services-manager.js"></script>
    <script src="admin/js/blog-manager.js"></script>
    <script src="admin/js/process-manager.js"></script>
    <script src="admin-content.js"></script>
    <script src="admin-taxonomy.js"></script>
    <script src="admin-system.js"></script>
    <script src="admin-image-utils.js"></script>
    <script src="admin-diagnostics.js"></script>
    <script src="realtime-sync-validator.js"></script>
    <script src="admin/js/product-admin.js"></script>
    <script src="admin/js/order-admin.js"></script>
    <script src="admin/js/coupon-admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // 1. Inicializar file inputs después de que todos los módulos estén listos
                if (typeof initImageUploads === 'function') {
                    initImageUploads();
                }
                
                // 2. Inicializar sistema de auditoría
                if (typeof AdminSystem !== 'undefined' && AdminSystem.init) {
                    AdminSystem.init();
                }
                
                // 3. Verificar autenticación y desbloquear panel
                if(localStorage.getItem('kw_admin') === 'ok') {
                    AdminUI.unlock();
                }
            } catch (err) {
                console.error('Error en inicialización del admin:', err);
            }
        });
    </script>
</body>
</html>
