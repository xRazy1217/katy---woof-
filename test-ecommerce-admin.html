<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Panel de Administración E-commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Prueba Panel de Administración E-commerce</h1>

        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <!-- Productos -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-bold mb-4">Productos</h2>
                <button onclick="testProducts()" class="bg-blue-500 text-white px-4 py-2 rounded">Probar API</button>
                <div id="products-result" class="mt-4 text-sm"></div>
            </div>

            <!-- Pedidos -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-bold mb-4">Pedidos</h2>
                <button onclick="testOrders()" class="bg-green-500 text-white px-4 py-2 rounded">Probar API</button>
                <div id="orders-result" class="mt-4 text-sm"></div>
            </div>

            <!-- Cupones -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-bold mb-4">Cupones</h2>
                <button onclick="testCoupons()" class="bg-purple-500 text-white px-4 py-2 rounded">Probar API</button>
                <div id="coupons-result" class="mt-4 text-sm"></div>
            </div>
        </div>

        <!-- Crear Producto de Prueba -->
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-xl font-bold mb-4">Crear Producto de Prueba</h2>
            <form onsubmit="createTestProduct(event)" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <input type="text" id="test-name" placeholder="Nombre" class="border p-2 rounded" required>
                    <input type="number" id="test-price" placeholder="Precio" step="0.01" class="border p-2 rounded" required>
                </div>
                <textarea id="test-description" placeholder="Descripción" class="border p-2 rounded w-full" rows="3"></textarea>
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Crear Producto</button>
            </form>
            <div id="create-result" class="mt-4 text-sm"></div>
        </div>

        <!-- Crear Cupón de Prueba -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold mb-4">Crear Cupón de Prueba</h2>
            <form onsubmit="createTestCoupon(event)" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <input type="text" id="coupon-code" placeholder="Código" class="border p-2 rounded" required>
                    <input type="number" id="coupon-value" placeholder="Valor" step="0.01" class="border p-2 rounded" required>
                </div>
                <select id="coupon-type" class="border p-2 rounded">
                    <option value="fixed">Descuento fijo</option>
                    <option value="percentage">Descuento porcentual</option>
                </select>
                <button type="submit" class="bg-purple-500 text-white px-4 py-2 rounded">Crear Cupón</button>
            </form>
            <div id="coupon-create-result" class="mt-4 text-sm"></div>
        </div>
    </div>

    <script>
        async function testProducts() {
            const result = document.getElementById('products-result');
            try {
                const response = await fetch('/api/ecommerce/products');
                const data = await response.json();
                result.innerHTML = `<pre class="bg-gray-100 p-2 rounded">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                result.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
            }
        }

        async function testOrders() {
            const result = document.getElementById('orders-result');
            try {
                const response = await fetch('/api/ecommerce/orders');
                const data = await response.json();
                result.innerHTML = `<pre class="bg-gray-100 p-2 rounded">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                result.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
            }
        }

        async function testCoupons() {
            const result = document.getElementById('coupons-result');
            try {
                const response = await fetch('/api/ecommerce/coupons');
                const data = await response.json();
                result.innerHTML = `<pre class="bg-gray-100 p-2 rounded">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                result.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
            }
        }

        async function createTestProduct(event) {
            event.preventDefault();
            const result = document.getElementById('create-result');

            const formData = new FormData();
            formData.append('name', document.getElementById('test-name').value);
            formData.append('price', document.getElementById('test-price').value);
            formData.append('description', document.getElementById('test-description').value);
            formData.append('stock_quantity', 10);
            formData.append('stock_status', 'instock');

            try {
                const response = await fetch('/api/ecommerce/products', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                result.innerHTML = `<pre class="bg-gray-100 p-2 rounded">${JSON.stringify(data, null, 2)}</pre>`;
                if (data.success) {
                    testProducts(); // Refresh products list
                }
            } catch (error) {
                result.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
            }
        }

        async function createTestCoupon(event) {
            event.preventDefault();
            const result = document.getElementById('coupon-create-result');

            const couponData = {
                code: document.getElementById('coupon-code').value,
                discount_value: parseFloat(document.getElementById('coupon-value').value),
                discount_type: document.getElementById('coupon-type').value,
                description: 'Cupón de prueba'
            };

            try {
                const response = await fetch('/api/ecommerce/coupons', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(couponData)
                });
                const data = await response.json();
                result.innerHTML = `<pre class="bg-gray-100 p-2 rounded">${JSON.stringify(data, null, 2)}</pre>`;
                if (data.success) {
                    testCoupons(); // Refresh coupons list
                }
            } catch (error) {
                result.innerHTML = `<span class="text-red-500">Error: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
