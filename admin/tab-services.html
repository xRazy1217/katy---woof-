<!-- Admin Services Tab Component -->
<div id="tab-services" class="tab-content hidden">
    <div class="grid lg:grid-cols-3 gap-12">
        <div class="lg:col-span-1 space-y-8">
            <div id="services-form-container" class="glass-card p-8 rounded-[2.5rem] transition-all duration-500">
                <h2 id="service-title-form" class="text-xl serif font-bold mb-6">Nuevo Servicio</h2>
                <form id="service-form" class="space-y-4">
                    <input type="hidden" id="service-id">
                    <input type="text" id="service-title" placeholder="Título" class="form-input">
                    <textarea id="service-desc" rows="4" placeholder="Descripción" class="form-input"></textarea>
                    <input type="file" id="service-file" class="form-input" accept="image/*">
                    <div id="service-file-info"></div>
                    <img id="service-preview" style="display:none; max-height:200px; border-radius:0.75rem;" alt="Preview">
                    <div class="flex flex-col gap-2">
                        <button type="button" id="service-submit-btn" onclick="AdminContent.saveService()" class="w-full py-4 btn-magic rounded-xl font-bold uppercase text-[10px]">Publicar Servicio</button>
                        <button type="button" id="service-cancel-btn" onclick="AdminContent.cancelEdit('services')" class="hidden w-full py-3 bg-stone-100 text-stone-500 rounded-xl font-bold uppercase text-[9px]">Cancelar Edición</button>
                    </div>
                </form>
            </div>
        </div>
        <div id="services-list" class="space-y-2 lg:col-span-2"></div>
    </div>
</div>
