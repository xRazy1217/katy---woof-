<!-- Admin Identity Tab Component -->
<div id="tab-identity" class="tab-content">
    <div class="grid lg:grid-cols-2 gap-12">
        <div class="glass-card p-10 rounded-[3rem] space-y-6">
            <h2 class="text-xl serif font-bold border-b border-stone-100 pb-4">Branding Visual</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2 text-center">
                    <div class="h-24 bg-stone-50 rounded-xl flex items-center justify-center p-2"><img id="preview-logo" class="max-h-full object-contain"></div>
                    <div class="file-input-wrapper">
                        <input type="file" id="site-logo-input" class="text-[9px]" accept="image/*">
                    </div>
                    <div id="site-logo-file-info" class="hidden p-2 rounded-lg bg-stone-50 border-l-4 border-soft-blue text-xs"></div>
                </div>
                <div class="space-y-2 text-center">
                    <div class="h-24 bg-stone-50 rounded-xl flex items-center justify-center"><img id="preview-favicon" class="w-8 h-8"></div>
                    <div class="file-input-wrapper">
                        <input type="file" id="site-favicon-input" class="text-[9px]" accept="image/*">
                    </div>
                    <div id="site-favicon-file-info" class="hidden p-2 rounded-lg bg-stone-50 border-l-4 border-soft-blue text-xs"></div>
                </div>
            </div>
            <button onclick="AdminTaxonomy.saveIdentitySettings()" class="w-full py-4 btn-magic rounded-xl font-bold uppercase text-[10px]">Actualizar Marca</button>
        </div>
        <div class="glass-card p-10 rounded-[3rem] space-y-4">
            <h2 class="text-xl serif font-bold border-b border-stone-100 pb-4">Datos de Contacto & Redes</h2>
            <input type="email" id="id-contact_email" class="form-input" placeholder="Email Corporativo">
            <input type="text" id="id-contact_whatsapp" class="form-input" placeholder="WhatsApp (+34...)">
            <input type="text" id="id-contact_address" class="form-input" placeholder="Ubicación">
            <input type="text" id="id-social_instagram" class="form-input" placeholder="URL Instagram">
            <textarea id="id-footer_philosophy" class="form-input" rows="3" placeholder="Filosofía (Footer)"></textarea>
            <button onclick="AdminTaxonomy.saveIdentitySettings()" class="w-full py-4 border-2 border-stone-800 text-stone-800 rounded-xl font-bold uppercase text-[10px]">Guardar Cambios</button>
        </div>
    </div>
</div>
