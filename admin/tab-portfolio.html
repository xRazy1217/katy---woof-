<!-- Admin Portfolio Tab Component -->
<div id="tab-portfolio" class="tab-content hidden">
    <div class="grid lg:grid-cols-3 gap-12">
        <div class="lg:col-span-1 space-y-8">
            <div id="portfolio-form-container" class="glass-card p-8 rounded-[2.5rem] transition-all duration-500">
                <h2 id="portfolio-title-form" class="text-xl serif font-bold mb-6">Archivar Obra</h2>
                <form id="portfolio-form" class="space-y-4">
                    <input type="hidden" id="art-id">
                    <input type="text" id="art-name" placeholder="Nombre de la mascota" class="form-input">
                    <textarea id="art-description" placeholder="Pequeña descripción de la obra..." class="form-input" rows="2"></textarea>
                    <input type="file" id="art-file" class="form-input" accept="image/*">
                    <div id="art-file-info"></div>
                    <img id="art-preview" style="display:none; max-height:200px; border-radius:0.75rem;" alt="Preview">
                    <div class="flex flex-col gap-2">
                        <button type="button" id="art-submit-btn" onclick="AdminContent.savePortfolio()" class="w-full py-4 btn-magic rounded-xl font-bold uppercase text-[10px]">Subir al Archivo</button>
                        <button type="button" id="art-cancel-btn" onclick="AdminContent.cancelEdit('portfolio')" class="hidden w-full py-3 bg-stone-100 text-stone-500 rounded-xl font-bold uppercase text-[9px]">Cancelar Edición</button>
                    </div>
                </form>
            </div>
        </div>
        <div id="portfolio-list" class="grid grid-cols-2 md:grid-cols-3 gap-4 lg:col-span-2"></div>
    </div>
</div>
