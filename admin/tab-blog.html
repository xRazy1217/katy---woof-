<!-- Admin Blog Tab Component -->
<div id="tab-blog" class="tab-content hidden">
    <div class="grid lg:grid-cols-3 gap-12">
        <div class="lg:col-span-1 space-y-8">
            <div id="blog-form-container" class="glass-card p-8 rounded-[2.5rem] transition-all duration-500">
                <h2 id="blog-title-form" class="text-xl serif font-bold mb-6">Nueva Historia</h2>
                <form id="blog-form" class="space-y-4">
                    <input type="hidden" id="blog-id">
                    <input type="text" id="blog-title" placeholder="Título" class="form-input">
                    <select id="blog-category" class="form-input"></select>
                    <textarea id="blog-content" rows="6" placeholder="Contenido" class="form-input"></textarea>
                    <input type="file" id="blog-file" class="form-input" accept="image/*">
                    <img id="blog-preview" class="hidden w-full h-48 object-cover rounded-lg border-2 border-soft-blue" alt="Preview">
                    <div id="blog-file-info" class="hidden p-3 rounded-lg bg-stone-50 border-l-4 border-soft-blue text-sm"></div>
                    <div class="flex flex-col gap-2">
                        <button type="button" id="blog-submit-btn" onclick="AdminContent.saveBlog()" class="w-full py-4 btn-magic rounded-xl font-bold uppercase text-[10px]">Publicar en Blog</button>
                        <button type="button" id="blog-cancel-btn" onclick="AdminContent.cancelEdit('blog')" class="hidden w-full py-3 bg-stone-100 text-stone-500 rounded-xl font-bold uppercase text-[9px]">Cancelar Edición</button>
                    </div>
                </form>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] bg-stone-50/50">
                <h3 class="text-[10px] font-black uppercase tracking-widest mb-6 text-stone-500">Temas del Blog</h3>
                <div class="space-y-4">
                    <input type="text" id="new-blog_categories" class="form-input text-xs py-3" placeholder="Nuevo tema...">
                    <button onclick="AdminTaxonomy.addListItem('blog_categories')" class="w-full py-3 bg-midnight text-white rounded-xl font-bold uppercase text-[9px]">Añadir Tema</button>
                </div>
                <div id="list-blog_categories" class="mt-6 space-y-2 max-h-48 overflow-y-auto"></div>
            </div>
        </div>
        <div id="blog-list" class="space-y-2 lg:col-span-2"></div>
    </div>
</div>
